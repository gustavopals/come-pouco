<section class="page-shell auth-shell">
  <mat-card class="auth-card" appearance="raised">
    <mat-card-header>
      <mat-card-title>Esqueci minha senha</mat-card-title>
      <mat-card-subtitle>Informe seu e-mail para receber o link de redefinicao.</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
        <mat-form-field appearance="outline">
          <mat-label>E-mail</mat-label>
          <input matInput type="email" formControlName="email" placeholder="email@dominio.com" />
          <mat-error *ngIf="form.controls.email.touched && form.controls.email.invalid">Informe um e-mail valido.</mat-error>
        </mat-form-field>

        <button mat-flat-button color="primary" type="submit" [disabled]="isSubmitting$ | async">
          {{ (isSubmitting$ | async) ? 'Enviando...' : 'Enviar link' }}
        </button>

        <a mat-stroked-button routerLink="/login">Voltar ao login</a>
      </form>

      <p class="status-block status-success" *ngIf="message$ | async as message">{{ message }}</p>
      <p class="status-block status-error" *ngIf="error$ | async as error">{{ error }}</p>
    </mat-card-content>
  </mat-card>
</section>
