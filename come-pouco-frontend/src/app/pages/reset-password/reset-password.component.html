<section class="page-shell auth-shell">
  <mat-card class="auth-card" appearance="raised">
    <mat-card-header>
      <mat-card-title>Redefinir senha</mat-card-title>
      <mat-card-subtitle>Crie uma nova senha para sua conta.</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
        <mat-form-field appearance="outline">
          <mat-label>Nova senha</mat-label>
          <input matInput type="password" formControlName="newPassword" placeholder="Minimo 8 caracteres" />
          <mat-error *ngIf="form.controls.newPassword.touched && form.controls.newPassword.invalid">
            A senha deve ter ao menos 8 caracteres.
          </mat-error>
        </mat-form-field>

        <button mat-flat-button color="primary" type="submit" [disabled]="isSubmitting$ | async">
          {{ (isSubmitting$ | async) ? 'Salvando...' : 'Redefinir senha' }}
        </button>

        <a mat-stroked-button routerLink="/login">Voltar ao login</a>
      </form>

      <p class="status-block status-success" *ngIf="message$ | async as message">{{ message }}</p>
      <p class="status-block status-error" *ngIf="error$ | async as error">{{ error }}</p>
    </mat-card-content>
  </mat-card>
</section>
