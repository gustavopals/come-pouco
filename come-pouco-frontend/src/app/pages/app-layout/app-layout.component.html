<section class="page-shell">
  <mat-toolbar color="primary" class="app-toolbar">
    <strong>Painel</strong>
    <span class="toolbar-spacer"></span>

    <a
      mat-button
      routerLink="/home"
      routerLinkActive="active-link"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      Home
    </a>
    <a mat-button routerLink="/my-company" routerLinkActive="active-link" *ngIf="authService.isOwner()">Minha Empresa</a>
    <a mat-button routerLink="/affiliate-links" routerLinkActive="active-link">Links Afiliados</a>
    <a mat-button routerLink="/security" routerLinkActive="active-link">Seguranca</a>
    <a mat-button routerLink="/users" routerLinkActive="active-link" *ngIf="authService.isAdmin()">Usuarios</a>
    <a mat-button routerLink="/companies" routerLinkActive="active-link" *ngIf="authService.isAdmin()">Empresas</a>
    <a mat-button routerLink="/purchase-platforms" routerLinkActive="active-link" *ngIf="authService.isAdmin()">
      Plataforma de Compras
    </a>

    <button mat-flat-button color="warn" type="button" (click)="logout()">Sair</button>
  </mat-toolbar>

  <router-outlet></router-outlet>
</section>
