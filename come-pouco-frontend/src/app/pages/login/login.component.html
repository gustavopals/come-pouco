<section class="page-shell auth-shell">
  <mat-card class="auth-card" appearance="raised" *ngIf="vm$ | async as vm">
    <mat-card-header>
      <mat-card-title>Painel</mat-card-title>
      <mat-card-subtitle *ngIf="!vm.tempToken">Acesse com seu usuario para entrar na area administrativa.</mat-card-subtitle>
      <mat-card-subtitle *ngIf="vm.tempToken">Verificacao em duas etapas</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form *ngIf="!vm.tempToken" [formGroup]="loginForm" (ngSubmit)="submit(vm)" class="auth-form">
        <mat-form-field appearance="outline">
          <mat-label>Usuario ou e-mail</mat-label>
          <input matInput type="text" formControlName="identifier" />
          <mat-error *ngIf="loginForm.controls.identifier.touched && loginForm.controls.identifier.invalid">
            Informe o usuario ou e-mail.
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Senha</mat-label>
          <input matInput type="password" formControlName="password" placeholder="******" />
          <mat-error *ngIf="loginForm.controls.password.touched && loginForm.controls.password.invalid">
            A senha e obrigatoria.
          </mat-error>
        </mat-form-field>

        <button mat-flat-button color="primary" type="submit" [disabled]="vm.isSubmitting">
          {{ vm.isSubmitting ? 'Entrando...' : 'Entrar' }}
        </button>
      </form>

      <form *ngIf="vm.tempToken" [formGroup]="twoFactorForm" (ngSubmit)="submit(vm)" class="auth-form">
        <mat-form-field appearance="outline">
          <mat-label>Codigo TOTP ou backup</mat-label>
          <input matInput type="text" formControlName="code" placeholder="000000 ou 1234-5678" />
          <mat-error *ngIf="twoFactorForm.controls.code.touched && twoFactorForm.controls.code.invalid">
            Informe o codigo de verificacao.
          </mat-error>
        </mat-form-field>

        <mat-checkbox formControlName="trustDevice">Confiar neste navegador (30 dias)</mat-checkbox>

        <button mat-flat-button color="primary" type="submit" [disabled]="vm.isSubmitting">
          {{ vm.isSubmitting ? 'Verificando...' : 'Confirmar' }}
        </button>

        <button mat-stroked-button type="button" (click)="backToLogin()" [disabled]="vm.isSubmitting">
          Voltar
        </button>
      </form>

      <p class="status-block status-error" *ngIf="vm.errorMessage">{{ vm.errorMessage }}</p>
    </mat-card-content>

  </mat-card>
</section>
